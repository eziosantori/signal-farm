# ---------------------------------------------------------------------------
# US Stocks (regular session)
# ---------------------------------------------------------------------------
us_stocks:
  # All stocks use Alpaca provider (2y 30m data) when ALPACA_API_KEY is set.
  # Grid optimized on 2y Alpaca data — profile atr_stop_mult=2.0, rsi_tight=3 pre-applied.
  # ✅ = positive edge found  ⚠️ = marginal  ❌ = no edge (monitor only)

  AAPL:
    feed: aaplususd
    asset_class: us_stocks
    description: "Apple Inc."
    yfinance: "AAPL"
    best_variant: A
    edge: "none"          # ❌ Sharpe -0.22 on 2y — choppy range-bound, avoid
    best_params: {atr_stop_mult: 1.5, min_score: 68, rsi_tightening: 0}

  MSFT:
    feed: msftususd
    asset_class: us_stocks
    description: "Microsoft Corp."
    yfinance: "MSFT"
    best_variant: A
    edge: "strong"        # ✅ Sharpe 0.91 | PF 1.61 | +19.6% | 56 trades/2y
