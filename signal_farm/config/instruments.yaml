    edge: "marginal"

  GBPJPY:
    feed: gbpjpy
    asset_class: forex
    description: "British Pound / Japanese Yen"
    yfinance: "GBPJPY=X"
    best_variant: B             # ✅ Sharpe 0.67 | PF 1.24 | +23.7% — DD alto (-26.5%)
    edge: "good"

  EURCHF:
    feed: eurchf
    asset_class: forex
    description: "Euro / Swiss Franc"
    yfinance: "EURCHF=X"
