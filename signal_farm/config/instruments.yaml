# ---------------------------------------------------------------------------
# Precious Metals (CFD/Spot — 24h/23h trading)
# ---------------------------------------------------------------------------
precious_metals:
  XAUUSD:
    feed: xauusd
    asset_class: precious_metals
    description: "Gold Spot / US Dollar"
    yfinance: "GC=F"            # Gold futures ~23h, best proxy for spot gold
    best_variant: B             # Sharpe 1.82 — Keltner breakout dominant on gold

  XAGUSD:
    feed: xagusd
    asset_class: precious_metals
    description: "Silver Spot / US Dollar"
    yfinance: "SI=F"            # Silver futures
    best_variant: B

