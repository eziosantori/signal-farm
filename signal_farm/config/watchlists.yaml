# Watchlists per asset class.
# Symbols must match entries in instruments.yaml.
# For backtest: use canonical Dukascopy symbols (XAUUSD, BTCUSD, EURUSD, US500)
# For live signals via yfinance: use the yfinance field in instruments.yaml

us_stocks:
  - AAPL
  - MSFT
  - GOOGL
  - AMZN
  - NVDA
  - META
  - TSLA
  - NFLX
  - AMD
  - QCOM

indices_futures:
  - US500      # S&P 500  (Dukascopy) / SPY proxy yfinance
  - NAS100     # NASDAQ 100            / QQQ
  - GER40      # DAX 40               / EWG
  - UK100      # FTSE 100             / EWU

precious_metals:
  - XAUUSD     # Gold spot   (Dukascopy) / GLD proxy yfinance
  - XAGUSD     # Silver spot            / SLV

agricultural_commodities:
  - BRENT      # Brent crude
  - WTI        # WTI crude
  - NATGAS     # Natural gas

forex:
  majors:
    - EURUSD
    - GBPUSD
    - USDJPY
    - USDCHF
    - AUDUSD
    - USDCAD
    - NZDUSD
  crosses:
    - EURGBP
    - EURJPY
    - GBPJPY

crypto:
  - BTCUSD
  - ETHUSD
  - LTCUSD
  - ADAUSD

# ---------------------------------------------------------------------------
# Named watchlists — subsets for specific scan runs
# Usage: python main.py scan --watchlist beta
# ---------------------------------------------------------------------------
named_watchlists:
  beta:
    # MAG7 — Variant A (Pullback) per tutti, Variant B (Breakout) per i ticker con edge
    - MSFT                              # ✅ Variant A Pullback (Sharpe 0.91)
    - {canonical: MSFT, variant: B}     # ✅ Variant B Breakout (Sharpe 1.17 LONG)
    - META                              # ✅ Variant A Pullback (Sharpe 0.74)
    - {canonical: META, variant: B}     # ✅ Variant B Breakout (Sharpe 2.20 LONG)
    - {canonical: GOOGL, variant: B}    # ✅ Variant B Breakout only (Sharpe 1.93 LONG)
    - TSLA    # ✅ Sharpe 0.98
    - AMZN    # ✅ Sharpe 0.68
    - NVDA    # ⚠️ Sharpe 0.31 — marginal, incluso per il beta
    # Indici
    - NAS100  # ✅ Sharpe 0.86 (Variant B)
    - GER40   # ✅ Sharpe 1.40 (Variant A)
    # Metalli
    - XAUUSD  # ✅ Sharpe 1.82 (Variant B)
    # Forex
    - EURUSD  # ✅ Sharpe 0.57 (Variant B)
    - GBPUSD  # ✅ Sharpe 0.76 (Variant B)
    # Crypto
    - BTCUSD  # ⚠️ Sharpe 1.07 (Variant B) — incluso per beta
