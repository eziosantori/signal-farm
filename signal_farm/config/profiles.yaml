us_stocks:
  levels: 2
  allowed_directions: [LONG, SHORT]
  ecosystem_monitor: true   # v0.2: VIX + sector ETF size multiplier (NAS100/US scope)
  scan_hours:
    timezone: "US/Eastern"
    weekdays: [0,1,2,3,4]   # Mon–Fri
    start: "09:30"
    end: "16:00"
  director:
    interval: "1d"
    period: "200d"
    sma_fast: 10
    sma_slow: 50
    roc_period: 10
  executor:
    interval: "30m"
    period: "60d"
    atr_period: 14
    keltner_ema: 20
    keltner_atr: 10
    keltner_mult: 1.5
    long:
      sma_fast: 10
      sma_slow: 50
    short:
      sma_fast: 8
      sma_slow: 21
  session_filter:
    enabled: true
    start_et: "09:30"
    end_et: "16:00"
  rsi_period: 14
  rsi_filter:
    # Pre-applied rsi_tightening=3 (grid optimal across MSFT/META/AMZN/NVDA/TSLA)
    # Zones narrowed by 3pt each side vs original defaults.
    variant_a:
      long:  [44, 56]   # was [41,59] — tighter pullback zone for quality
      short: [44, 56]
    variant_b:
      long:  [54, 72]   # was [51,69] → +3 each side
      short: [28, 52]
  volume_scorer: true
  pullback_lookback: 10
  keltner_lookback: 15
  sma_touch_tolerance: 0.001
  min_score_threshold: 68   # 2y grid optimal (raise to 75 for NVDA individually)
  max_concurrent_positions: 3  # reduced from 5 — fewer but higher quality concurrent
  max_per_sector: 2
  rr_ratio: 2.0
  atr_stop_mult: 2.0           # 2y grid optimal — 1.5× too tight for 30m stock noise
  market_context:
    ticker: NAS100
    asset_class: indices_futures
    label: "NASDAQ"

indices_futures:
  levels: 3
  allowed_directions: [LONG, SHORT]
  ecosystem_monitor: true   # v0.2: VIX + sector ETF size multiplier (NAS100/US scope)
  scan_hours:
    timezone: "UTC"
    weekdays: [0,1,2,3,4]   # Mon–Fri; ~23h session — broad window covers all global indices
    start: "00:00"
    end: "22:00"
  director:
    interval: "1d"
    period: "200d"
    sma_fast: 10
    sma_slow: 50
    roc_period: 10
  filter:
    interval: "4h"
    period: "60d"
    sma_fast: 10
    sma_slow: 50
  executor:
    interval: "1h"
    period: "60d"
    atr_period: 14
    keltner_ema: 20
    keltner_atr: 10
    keltner_mult: 1.5
    long:
      sma_fast: 10
      sma_slow: 50
    short:
      sma_fast: 8
      sma_slow: 21
  session_filter:
    enabled: false
  rsi_period: 14
  rsi_filter:
    variant_a:
      long:  [38, 62]   # tightened by 3pt — moderate filter for indices
      short: [38, 62]
    variant_b:
      long:  [48, 72]
      short: [28, 52]
  volume_scorer: true
  pullback_lookback: 8    # grid: 8 optimal for GER40/US30
  keltner_lookback: 10   # grid: 10 optimal for NAS100/US500 (was 15)
  sma_touch_tolerance: 0.001
  min_score_threshold: 55  # moderate filter — GER40 best with 0, NAS100 with 62
