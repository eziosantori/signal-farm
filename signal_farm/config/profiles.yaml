forex:
  levels: 3
  allowed_directions: [LONG, SHORT]
  scan_hours:
    timezone: "UTC"
    weekdays: [0,1,2,3,4]   # Mon–Fri; forex is 24/5 — Sun 22:00 open covered on Mon scan
    start: "00:00"
    end: "23:59"
  director:
    interval: "1d"
    period: "200d"
    sma_fast: 10
    sma_slow: 50
    roc_period: 10
  filter:
    interval: "4h"
    period: "200d"
    sma_fast: 10
    sma_slow: 50
  executor:
    interval: "1h"
    period: "200d"
    atr_period: 14
    keltner_ema: 20
    keltner_atr: 10
    keltner_mult: 1.5
    long:
      sma_fast: 10
      sma_slow: 50
    short:
      sma_fast: 8
      sma_slow: 21
  session_filter:
    enabled: false       # forex trades 24/5
  rsi_period: 14
  rsi_filter:
    variant_a:
      long:  [38, 62]   # forex mean-reverts more — tighter zone
      short: [38, 62]
    variant_b:
      long:  [48, 70]
      short: [30, 52]
  volume_scorer: false   # tick volume only — unreliable for forex
  pullback_lookback: 10
  keltner_lookback: 10   # grid: 10 optimal for EURUSD (was 15)
  sma_touch_tolerance: 0.001
  min_score_threshold: 68  # grid: 68 best for EURUSD-B
  max_concurrent_positions: 4
  max_per_sector: 2
  rr_ratio: 2.0
  atr_stop_mult: 1.5
  market_context:
    ticker: EURUSD
    asset_class: forex
    label: "EUR/USD"
    same_as_signal: true   # when trading EURUSD itself — use dir_* columns

crypto:
  levels: 3
  allowed_directions: [LONG]
  scan_hours:
    always_open: true   # 24/7   # short side ha win rate < 25% nel campione; rivedere con dati più lunghi
  director:
    interval: "1d"
    period: "200d"
    sma_fast: 10
    sma_slow: 50
    roc_period: 10
  filter:
    interval: "4h"
    period: "60d"
    sma_fast: 10
    sma_slow: 50
  executor:
    interval: "1h"
    period: "60d"
    atr_period: 14
    keltner_ema: 20
    keltner_atr: 10
    keltner_mult: 1.5
    long:
      sma_fast: 10
      sma_slow: 50
    short:          # faster SMAs — crypto downtrends are sharp and brief
      sma_fast: 7
      sma_slow: 20
  session_filter:
    enabled: false
  rsi_period: 14
  rsi_filter:
    variant_a:
      long:  [35, 70]   # crypto can sustain higher RSI in bull runs
      short: [30, 65]
    variant_b:
      long:  [45, 78]   # wider zone — momentum can extend longer in crypto
      short: [22, 55]
  volume_scorer: true
  pullback_lookback: 8
  keltner_lookback: 10   # 2y grid optimal for BTC-B/C (was 12 tuned on shorter data)
  sma_touch_tolerance: 0.002
  min_score_threshold: 0   # BTC best without score gate (all combos tied at Sharpe 1.07)
  max_concurrent_positions: 3
  max_per_sector: 2
  rr_ratio: 2.0
  atr_stop_mult: 1.5        # BTC: 1.5× optimal; ETH needs 2.0 (use per-instrument override)
  market_context:
    ticker: BTCUSD
    asset_class: crypto
    label: "BTC"
    same_as_signal: true
